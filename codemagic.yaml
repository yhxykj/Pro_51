
workflows:
  ios-native-workflow:
    name: iOS Native
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Pro_51

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.musictop.hblok

      vars:
        BUNDLE_ID: "com.musictop.hblok"
        XCODE_WORKSPACE: "SKMusic.xcworkspace"
        XCODE_SCHEME: "SKMusic"
        APP_STORE_APPLE_ID: 6784500151

      xcode: latest
      cocoapods: default

    scripts:
      - name: Install CocoaPods dependencies
        script: |
          pod install

      - name: Set up provisioning profiles settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Auto increment BUILD_NUMBER
        script: |
          cd $CM_BUILD_DIR
          BUILD_NUMBER=${BUILD_NUMBER:-1}
          BUILD_NUMBER=$((BUILD_NUMBER + 1))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          /usr/bin/sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" SKMusic.xcodeproj/project.pbxproj
          grep "CURRENT_PROJECT_VERSION" SKMusic.xcodeproj/project.pbxproj

      - name: Build ipa for distribution
        script: |
          cd $CM_BUILD_DIR
          echo "Building workspace: $XCODE_WORKSPACE"
          echo "Using scheme: $XCODE_SCHEME"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - 15959281692@163.com
        notify:
          success: true
          failure: false

      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - group name 1
          - group name 2
        submit_to_app_store: false
